name: CD Pipeline - Spring Boot

on:
  workflow_run:
    workflows: ["CI Pipeline - Spring Boot"]
    types:
      - completed
    branches: [main]

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  DOCKER_IMAGE: ${{ github.repository_owner }}/springboot-demo
  APP_NAME: springboot-demo

jobs:
  # ============================================================
  # JOB 1: Check CI Status
  # ============================================================
  check-ci:
    name: ✅ Check CI Status
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: CI Passed - Proceeding to CD
        run: |
          echo "## ✅ CI Pipeline passed!" >> $GITHUB_STEP_SUMMARY
          echo "Proceeding with deployment..." >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 2: Build & Push Docker Image (Production Tag)
  # ============================================================
  build-production:
    name: 🐳 Build Production Image
    runs-on: ubuntu-latest
    needs: check-ci
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=prod-
            type=raw,value=production
            type=raw,value=latest

      - name: Build and Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Build Summary
        run: |
          echo "## 🐳 Production Image Built" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKER_IMAGE }}:production\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 3: Deploy to Staging
  # ============================================================
  deploy-staging:
    name: 🚧 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-production
    environment:
      name: staging
      url: https://staging.your-app.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # OPTION A: Deploy ke Railway
      # Uncomment bagian ini jika pakai Railway
      # -------------------------------------------------------
      # - name: Deploy to Railway (Staging)
      #   uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: ${{ env.APP_NAME }}-staging

      # -------------------------------------------------------
      # OPTION B: Deploy ke Render
      # Uncomment bagian ini jika pakai Render
      # -------------------------------------------------------
      # - name: Deploy to Render (Staging)
      #   run: |
      #     curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}

      # -------------------------------------------------------
      # OPTION C: Deploy ke VPS via SSH
      # Uncomment bagian ini jika pakai VPS
      # -------------------------------------------------------
      # - name: Deploy to VPS (Staging)
      #   uses: appleboy/ssh-action@master
      #   with:
      #     host: ${{ secrets.VPS_HOST }}
      #     username: ${{ secrets.VPS_USER }}
      #     key: ${{ secrets.VPS_SSH_KEY }}
      #     script: |
      #       docker pull ${{ env.DOCKER_IMAGE }}:production
      #       docker stop springboot-staging || true
      #       docker rm springboot-staging || true
      #       docker run -d \
      #         --name springboot-staging \
      #         -p 8081:8080 \
      #         ${{ env.DOCKER_IMAGE }}:production

      # -------------------------------------------------------
      # OPTION D: Deploy ke Fly.io
      # Uncomment bagian ini jika pakai Fly.io
      # -------------------------------------------------------
      # - name: Deploy to Fly.io (Staging)
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --remote-only --app ${{ env.APP_NAME }}-staging
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Staging Deploy Simulation
        run: |
          echo "🚧 Deploying to STAGING environment..."
          echo "Image: ${{ env.DOCKER_IMAGE }}:production"
          echo "✅ Staging deployment completed!"
          echo ""
          echo "## 🚧 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKER_IMAGE }}:production\`" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Staging" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 4: Smoke Test (after staging deploy)
  # ============================================================
  smoke-test:
    name: 🔥 Smoke Test Staging
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Run Smoke Test
        run: |
          echo "🔥 Running smoke tests on staging..."

          # Uncomment jika staging sudah live:
          # curl --fail https://staging.your-app.com/api/products || exit 1

          echo "✅ Smoke tests passed!"
          echo "## 🔥 Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| API Products | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Response Time | ✅ Pass |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 5: Deploy to Production
  # ============================================================
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-test
    environment:
      name: production
      url: https://your-app.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Uncomment sesuai platform yang kamu pakai
      # (sama seperti pilihan di staging di atas)
      # -------------------------------------------------------

      - name: Production Deploy Simulation
        run: |
          echo "🚀 Deploying to PRODUCTION environment..."
          echo "Image: ${{ env.DOCKER_IMAGE }}:production"
          echo "✅ Production deployment completed!"

      - name: Production Deploy Summary
        run: |
          echo "## 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKER_IMAGE }}:production\`" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 6: Notify Deployment Result
  # ============================================================
  notify:
    name: 📢 Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Deployment Notification Summary
        run: |
          echo "## 📢 CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ CI Check | ${{ needs.check-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Build Production Image | ${{ needs.build-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚧 Deploy Staging | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔥 Smoke Test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY

      # Uncomment jika mau notifikasi ke Slack:
      # - name: Notify Slack
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     payload: |
      #       {
      #         "text": "🚀 Deployment to production completed!\nRepo: ${{ github.repository }}\nCommit: ${{ github.event.workflow_run.head_sha }}"
      #       }
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
