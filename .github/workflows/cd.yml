name: CD Pipeline - Spring Boot

on:
  workflow_run:
    workflows: ["CI Pipeline - Spring Boot"]
    types:
      - completed

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  DOCKER_IMAGE: handikanainggolan/springboot-demo
  APP_NAME: springboot-demo

jobs:

  # ============================================================
  # JOB 1: Check CI Status
  # ============================================================
  check-ci:
    name: ✅ Check CI Status
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: CI Passed
        run: |
          echo "✅ CI Pipeline berhasil"
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"

  # ============================================================
  # JOB 2: Build Production Image
  # ============================================================
  build-production:
    name: 🐳 Build Production Image
    runs-on: ubuntu-latest
    needs: check-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=production
            type=raw,value=latest
            type=sha,prefix=prod-

      - name: Build and Push Production Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ============================================================
  # JOB 3: Deploy Staging
  # ============================================================
  deploy-staging:
    name: 🚧 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-production

    steps:
      - name: Deploy Simulation
        run: |
          echo "🚧 Deploying to staging..."
          echo "Image : ${{ env.DOCKER_IMAGE }}:production"
          echo "✅ Staging success"

  # ============================================================
  # JOB 4: Smoke Test
  # ============================================================
  smoke-test:
    name: 🔥 Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Smoke Test
        run: |
          echo "🔥 Running smoke tests..."
          echo "✅ Health Check PASS"
          echo "✅ API PASS"

  # ============================================================
  # JOB 5: Deploy Production
  # ============================================================
  deploy-production:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: smoke-test

    steps:
      - name: Production Deploy Simulation
        run: |
          echo "🚀 Deploying to production..."
          echo "Image : ${{ env.DOCKER_IMAGE }}:production"
          echo "✅ Production deployment success"

  # ============================================================
  # JOB 6: Notification
  # ============================================================
  notify:
    name: 📢 Notify Deployment
    runs-on: ubuntu-latest
    if: always()

    needs:
      - check-ci
      - build-production
      - deploy-staging
      - smoke-test
      - deploy-production

    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI Check | ${{ needs.check-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Production Image | ${{ needs.build-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Staging | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
